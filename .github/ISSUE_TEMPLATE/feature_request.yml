name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What analytics, consent, or performance problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or documentation change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other approaches have you tried?
  - type: checkboxes
    id: impact
    attributes:
      label: Impact area
      options:
        - label: Bootstrap size or early page performance
        - label: Consent handling
        - label: GA4 integration
        - label: Yandex Metrica integration
        - label: Documentation or examples
