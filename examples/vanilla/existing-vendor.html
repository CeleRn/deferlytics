<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deferlytics Existing Vendor Example</title>
    <script>
      window.dataLayer = window.dataLayer || [];
      window.gtag =
        window.gtag ||
        function gtag() {
          window.dataLayer.push(arguments);
        };
    </script>
    <script id="deferlytics-ga4-G-XXXXXXX" src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>
    <script src="../../dist/bootstrap.iife.js"></script>
    <script>
      fastAnalytics.init({
        debug: true,
        loadStrategy: "immediate",
        vendors: {
          ga4: {
            enabled: true,
            measurementId: "G-XXXXXXX",
            sendPageView: false,
          },
        },
      });

      fastAnalytics.page({ example: "existing-vendor" });
      fastAnalytics.track("existing_vendor_event");
    </script>
    <script defer src="../../dist/loader.iife.js"></script>
  </head>
  <body>
    <main>
      <h1>Reusing an existing vendor script</h1>
      <p>
        This example shows the shape of a page where GA4 is already present. Deferlytics
        reuses the existing script tag instead of adding another one.
      </p>
    </main>
  </body>
</html>
